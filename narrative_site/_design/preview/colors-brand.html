<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}
  body{background:var(--paper);padding:20px 20px}
  .card{width:660px;color:var(--ink)}
  .grid{display:grid;gap:8px}
  .swatch{height:54px;border-radius:var(--r-1);border:1px solid rgba(26,26,26,.06)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);line-height:1.2;display:flex;justify-content:space-between;gap:6px;margin-top:6px}
  .meta b{font-family:var(--font-sans);font-size:12px;color:var(--ink);font-weight:600}
  .lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px}
  .row{display:flex;gap:12px;align-items:stretch}
</style></head><body><div class="card">
<div class="grid" style="grid-template-columns: repeat(4, 1fr); gap:10px">
  <div><div class="swatch" style="background:var(--ink)"></div><div class="meta"><b>Ink</b><span>#1a1a1a</span></div><div class="meta"><span>Total nonfarm · spine</span></div></div>
  <div><div class="swatch" style="background:var(--services)"></div><div class="meta"><b>Services</b><span>#1f5fa6</span></div><div class="meta"><span>Pro &amp; bus svcs</span></div></div>
  <div><div class="swatch" style="background:var(--education)"></div><div class="meta"><b>Education</b><span>#2c8a57</span></div><div class="meta"><span>Edu &amp; health</span></div></div>
  <div><div class="swatch" style="background:var(--manufacturing)"></div><div class="meta"><b>Manufacturing</b><span>#c9602b</span></div><div class="meta"><span>Manufacturing</span></div></div>
</div></div></body></html>
