<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--paper);padding:18px 20px}.card{width:660px;color:var(--ink)}
.lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:2px;cursor:pointer;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:0}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-link{background:transparent;border:0;border-bottom:1.5px solid var(--ink);border-radius:0;padding:6px 0;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);letter-spacing:.04em}
.chip .dot{width:8px;height:8px;border-radius:999px}
.kicker{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
</style></head><body><div class="card">
<div class="lbl">AIOE threshold slider · the linked-view control</div>
<div style="font-family:var(--font-sans);font-size:14px;color:var(--ink-2);margin-bottom:16px">Show only occupations with AIOE ≥ <b style="font-family:var(--font-mono);color:var(--ink)">+0.74</b></div>
<div style="position:relative;height:56px;margin-top:8px">
  <!-- value label, sitting cleanly above the handle -->
  <div style="position:absolute;top:0;left:calc(62% - 22px);width:44px;text-align:center;font-family:var(--font-mono);font-size:12px;color:var(--ink);font-weight:500">+0.74</div>
  <!-- track + active range -->
  <div style="position:absolute;top:32px;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--exp-low),var(--exp-mid),var(--exp-high));border-radius:2px"></div>
  <div style="position:absolute;top:32px;left:62%;right:0;height:3px;background:var(--ink);border-radius:2px"></div>
  <!-- handle -->
  <div style="position:absolute;top:22px;left:calc(62% - 11px);width:22px;height:22px;background:var(--paper);border:1.5px solid var(--ink);border-radius:999px;box-shadow:0 1px 0 rgba(26,26,26,.04),0 1px 2px rgba(26,26,26,.06)"></div>
</div>
<div style="display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:11px;color:var(--ink-3);margin-top:4px">
  <span>−2.5 · low exposure</span><span>0</span><span>+1.5 · high exposure</span>
</div>
<div style="font-family:var(--font-sans);font-size:13px;color:var(--ink-3);margin-top:14px">214 of 749 occupations match · 39% of total employment</div></div></body></html>
