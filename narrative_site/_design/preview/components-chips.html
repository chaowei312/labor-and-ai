<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--paper);padding:18px 20px}.card{width:660px;color:var(--ink)}
.lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:2px;cursor:pointer;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:0}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-link{background:transparent;border:0;border-bottom:1.5px solid var(--ink);border-radius:0;padding:6px 0;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);letter-spacing:.04em}
.chip .dot{width:8px;height:8px;border-radius:999px}
.kicker{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
</style></head><body><div class="card">
<div class="lbl">Eyebrow / kicker</div>
<div class="kicker" style="margin-bottom:14px">Act 3 · Probing the thesis</div>
<div class="lbl">Sector chip</div>
<div style="display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap">
  <span class="chip"><span class="dot" style="background:var(--total)"></span>Total nonfarm</span>
  <span class="chip"><span class="dot" style="background:var(--services)"></span>Pro &amp; bus svcs</span>
  <span class="chip"><span class="dot" style="background:var(--education)"></span>Edu &amp; health</span>
  <span class="chip"><span class="dot" style="background:var(--manufacturing)"></span>Manufacturing</span>
</div>
<div class="lbl">Caveat tag</div>
<div style="display:flex;gap:8px">
  <span class="chip" style="background:transparent;border:1px solid var(--rule);color:var(--ink-3)">OEWS p90 top-coded ≈ $208 k</span>
  <span class="chip" style="background:transparent;border:1px solid var(--rule);color:var(--ink-3)">SOC 2010 → SOC 2018</span>
</div></div></body></html>
