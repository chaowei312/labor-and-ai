<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--paper);padding:18px 20px}.card{width:660px;color:var(--ink)}
.lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:2px;cursor:pointer;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:0}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-link{background:transparent;border:0;border-bottom:1.5px solid var(--ink);border-radius:0;padding:6px 0;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);letter-spacing:.04em}
.chip .dot{width:8px;height:8px;border-radius:999px}
.kicker{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
</style></head><body><div class="card">
<div class="lbl">Source line · every chart carries one</div>
<div style="border-top:1px solid var(--rule);padding-top:8px;font-family:var(--font-sans);font-size:13px;color:var(--ink-3);line-height:1.5">
  <b style="color:var(--ink-2);font-weight:600">Source</b> · BLS Current Employment Statistics, national, seasonally adjusted, Jan 2010 → Mar 2026 &nbsp;·&nbsp; <b style="color:var(--ink-2);font-weight:600">Chart</b> Labor &amp; AI &nbsp;·&nbsp; <span style="font-family:var(--font-mono);font-size:12px">fig_01_ces_indexed</span>
</div></div></body></html>
