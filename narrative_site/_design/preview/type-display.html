<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}body{background:var(--paper);padding:18px 20px}
  .card{width:660px;color:var(--ink)}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px dashed var(--paper-3)}
  .row:last-child{border-bottom:0}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);width:88px;flex:none;letter-spacing:0}
  .specimen{flex:1;min-width:0;color:var(--ink)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-align:right;flex:none}
  .lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600}
</style></head><body><div class="card">
<div class="lbl">Display · Source Serif 4</div>
<div class="row"><div class="name">hero</div><div class="specimen" style="font-family:var(--font-serif);font-size:60px;line-height:1.02;letter-spacing:-.022em;font-weight:600">The throne, measured</div><div class="meta">60 / 1.02 · 600</div></div>
<div class="row"><div class="name">display</div><div class="specimen" style="font-family:var(--font-serif);font-size:42px;line-height:1.08;letter-spacing:-.02em;font-weight:600">Where AI is positioned</div><div class="meta">42 / 1.08 · 600</div></div>
<div class="row"><div class="name">h1 / act</div><div class="specimen" style="font-family:var(--font-serif);font-size:28px;line-height:1.18;letter-spacing:-.015em;font-weight:600">Through 2023, displacement isn't visible at scale</div><div class="meta">28 / 1.18 · 600</div></div></div></body></html>
