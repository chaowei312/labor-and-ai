<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Preview card</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin: 0; }
  body { background: var(--paper); padding: 20px; }
  .card { width: 660px; }
  .swatch { width: 100%; height: 56px; border-radius: var(--r-1); }
  .row { display: flex; gap: 8px; align-items: stretch; }
  .col { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 0; }
  .meta { display: flex; justify-content: space-between; gap: 8px; font-family: var(--font-mono); font-size: 11px; color: var(--ink-3); line-height: 1.2; }
  .meta b { font-family: var(--font-sans); font-size: 12px; color: var(--ink); font-weight: 600; }
  table { width: 100%; border-collapse: collapse; }
  td, th { padding: 0; vertical-align: baseline; text-align: left; }
</style>
</head>
<body>
<div class="card"><!-- content --></div>
</body>
</html>
