<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
html,body{margin:0}
body{background:var(--paper);padding:18px 20px}
.card{width:660px;color:var(--ink)}
.lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.kicker{font-family:var(--font-sans);font-size:11px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-3)}
.row{display:flex;align-items:center;justify-content:space-between;gap:14px;font-family:var(--font-sans);font-size:13px;padding:3px 0}
.row .swatch{width:8px;height:8px;border-radius:999px;flex:none}
.row .name{color:var(--ink-2);flex:1}
.row .val{font-family:var(--font-mono);font-size:13px;color:var(--ink);font-variant-numeric:tabular-nums}
.row.dim .name,.row.dim .val{color:var(--ink-3)}
</style></head><body><div class="card">
<div class="lbl">Chart tooltip · hover state</div>
<div style="position:relative;height:340px;background:var(--paper-2);border-radius:4px;overflow:hidden">
  <svg viewBox="0 0 660 200" width="100%" height="200" preserveAspectRatio="none" style="display:block">
    <!-- gridlines -->
    <g stroke="var(--rule)" stroke-width=".6">
      <line x1="40" y1="30"  x2="640" y2="30"/>
      <line x1="40" y1="95"  x2="640" y2="95"/>
      <line x1="40" y1="160" x2="640" y2="160"/>
    </g>
    <!-- y-axis ticks -->
    <g font-family="IBM Plex Mono" font-size="10" fill="var(--ink-3)">
      <text x="34" y="34"  text-anchor="end">140</text>
      <text x="34" y="99"  text-anchor="end">120</text>
      <text x="34" y="164" text-anchor="end">100</text>
    </g>
    <!-- vertical guideline at hover x, extending past data into the tooltip area -->
    <line x1="320" y1="10" x2="320" y2="195" stroke="var(--ink-3)" stroke-width=".8" stroke-dasharray="2 3" opacity=".55"/>
    <!-- two series -->
    <path d="M40 165 C 140 158, 230 138, 330 110 S 520 70, 640 50"
          fill="none" stroke="#2c8a57" stroke-width="2"/>
    <path d="M40 150 C 130 145, 220 130, 320 95 S 520 55, 640 38"
          fill="none" stroke="#1f5fa6" stroke-width="2"/>
    <!-- hover dots -->
    <circle cx="320" cy="110" r="4.5" fill="#2c8a57" stroke="var(--paper)" stroke-width="1.6"/>
    <circle cx="320" cy="95"  r="4.5" fill="#1f5fa6" stroke="var(--paper)" stroke-width="1.6"/>
  </svg>
  <!-- tooltip docked below the chart, aligned to the hover guideline -->
  <div style="
    position:absolute;left:196px;top:218px;
    background:var(--paper);
    border:1px solid var(--rule);
    box-shadow:0 10px 32px -10px rgba(26,26,26,.22), 0 1px 0 rgba(26,26,26,.04);
    padding:10px 14px;border-radius:3px;width:248px">
    <!-- caret pointing up to the hover x -->
    <div style="position:absolute;top:-7px;left:118px;width:12px;height:12px;background:var(--paper);border-left:1px solid var(--rule);border-top:1px solid var(--rule);transform:rotate(45deg)"></div>
    <div class="kicker" style="margin-bottom:6px">March 2020</div>
    <div class="row">
      <span class="swatch" style="background:#1f5fa6"></span>
      <span class="name">Pro &amp; bus svcs</span>
      <span class="val">129.0</span>
    </div>
    <div class="row dim">
      <span class="swatch" style="background:#2c8a57"></span>
      <span class="name">Edu &amp; health</span>
      <span class="val">122.4</span>
    </div>
    <div style="margin-top:6px;padding-top:6px;border-top:1px solid var(--rule);font-family:var(--font-mono);font-size:11px;color:var(--ink-3);letter-spacing:.02em">
      Index Jan 2010 = 100 · CES SA
    </div>
  </div>
</div></div></body></html>
