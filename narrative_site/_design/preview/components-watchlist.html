<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>html,body{margin:0}body{background:var(--paper);padding:18px 20px}.card{width:660px;color:var(--ink)}
.lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:10px;font-weight:600}
.btn{font-family:var(--font-sans);font-size:14px;font-weight:500;padding:10px 18px;border-radius:2px;cursor:pointer;border:1.5px solid var(--ink);background:var(--ink);color:var(--paper);letter-spacing:0}
.btn-ghost{background:transparent;color:var(--ink)}
.btn-link{background:transparent;border:0;border-bottom:1.5px solid var(--ink);border-radius:0;padding:6px 0;color:var(--ink)}
.chip{display:inline-flex;align-items:center;gap:6px;font-family:var(--font-sans);font-size:12px;padding:4px 10px;border-radius:999px;background:var(--paper-2);color:var(--ink-2);letter-spacing:.04em}
.chip .dot{width:8px;height:8px;border-radius:999px}
.kicker{font-family:var(--font-sans);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-3)}
</style></head><body><div class="card">
<div class="lbl">Watchlist row · coda infographic atom</div>
<div style="display:flex;gap:14px;align-items:flex-start;padding:14px 0;border-top:1.5px solid var(--ink)">
  <div style="width:36px;height:36px;flex:none;display:flex;align-items:center;justify-content:center;color:var(--watch)">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3"/></svg>
  </div>
  <div style="flex:1">
    <div class="kicker" style="color:var(--watch);margin-bottom:4px">What to watch · 01</div>
    <div style="font-family:var(--font-serif);font-size:20px;line-height:1.3;font-weight:600;color:var(--ink);margin-bottom:6px">JOLTS in high-AIOE occupations</div>
    <div style="font-family:var(--font-serif);font-size:15px;line-height:1.5;color:var(--ink-2)">Openings and separations in Computer &amp; Mathematical and Legal — the highest-leverage data add this year. The thesis predicts separations rising fastest here.</div>
  </div>
</div></div></body></html>
