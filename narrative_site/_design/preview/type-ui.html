<!DOCTYPE html>
<html lang="en"><head><meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0}body{background:var(--paper);padding:18px 20px}
  .card{width:660px;color:var(--ink)}
  .row{display:flex;align-items:baseline;gap:14px;padding:6px 0;border-bottom:1px dashed var(--paper-3)}
  .row:last-child{border-bottom:0}
  .name{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);width:88px;flex:none;letter-spacing:0}
  .specimen{flex:1;min-width:0;color:var(--ink)}
  .meta{font-family:var(--font-mono);font-size:11px;color:var(--ink-3);text-align:right;flex:none}
  .lbl{font-family:var(--font-sans);font-size:12px;color:var(--ink-3);letter-spacing:.06em;text-transform:uppercase;margin-bottom:8px;font-weight:600}
</style></head><body><div class="card">
<div class="lbl">UI · IBM Plex Sans</div>
<div class="row"><div class="name">kicker</div><div class="specimen" style="font-family:var(--font-sans);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;color:var(--ink-3)">Act 1 · Where AI is positioned</div><div class="meta">12 · 600 · 0.14em</div></div>
<div class="row"><div class="name">ui</div><div class="specimen" style="font-family:var(--font-sans);font-size:15px;font-weight:500">Drag the slider to set the AIOE threshold</div><div class="meta">15 · 500</div></div>
<div class="row"><div class="name">caption</div><div class="specimen" style="font-family:var(--font-sans);font-size:13px;color:var(--ink-3)">Boxes show p25/p50/p75 wage; whiskers extend to 1.5×IQR</div><div class="meta">13 · 400</div></div>
<div class="row"><div class="name">tick</div><div class="specimen" style="font-family:var(--font-sans);font-size:11px;color:var(--ink-3);font-feature-settings:'tnum' 1">2010   2012   2014   2016   2018   2020   2022   2024</div><div class="meta">11 · tnum</div></div></div></body></html>
